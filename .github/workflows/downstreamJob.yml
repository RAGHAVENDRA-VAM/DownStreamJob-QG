name: Downstream Job - ContactManager PR Quality Gate

on:
  workflow_dispatch:
    inputs:
      PR_REPOSITORY:
        required: true
        type: string
      PR_BRANCH:
        required: true
        type: string
      PR_COMMIT:
        required: true
        type: string
      PR_URL:
        required: true
        type: string

jobs:
  downstream:
    runs-on: windows-latest
    timeout-minutes: 120

    env:
      APP_NAME: ContactManager
      REPO_SLUG: contactmanager
      CICD_APP: CM

      BITBUCKET_BASE_URL: https://bitbucket.valuemomentum.alpha3-butterfly.guidewire.net

      CICD_BASE_URL: https://cicd-manager-service.api.omega2-andromeda.guidewire.net
      CICD_TENANT: valuemomentum
      CICD_STAR_SYSTEM: gwcp
      CICD_QUALITY_GATE: prqualitygate

      OKTA_TOKEN_URL: https://guidewire-hub.okta.com/oauth2/aus11vix3uKEpIfSI357/v1/token

    steps:

      # -------------------------------
      # Prepare Context
      # -------------------------------
      - name: Prepare Context
        shell: pwsh
        run: |
          $cleanBranch = "${{ inputs.PR_BRANCH }}" -replace "^refs/heads/", ""
          $repoUrl = "$env:BITBUCKET_BASE_URL/scm/gwcpdev/$env:REPO_SLUG.git"
          $reportDir = "reports/$env:APP_NAME/PR-${{ inputs.PR_COMMIT }}"

          Write-Host "Application Context"
          Write-Host "-------------------"
          Write-Host "Application : $env:APP_NAME"
          Write-Host "Repository  : ${{ inputs.PR_REPOSITORY }}"
          Write-Host "Branch      : $cleanBranch"
          Write-Host "Commit      : ${{ inputs.PR_COMMIT }}"

          "CLEAN_BRANCH=$cleanBranch" | Out-File -FilePath $env:GITHUB_ENV -Append
          "REPO_URL=$repoUrl" | Out-File -FilePath $env:GITHUB_ENV -Append
          "REPORT_DIR=$reportDir" | Out-File -FilePath $env:GITHUB_ENV -Append

      # -------------------------------
      # Checkout Source from Bitbucket
      # -------------------------------
      - name: Checkout Source
        shell: pwsh
        run: |
          git config --global http.sslVerify false
          git clone --depth 1 `
            --branch $env:CLEAN_BRANCH `
            https://${{ secrets.BITBUCKET_USERNAME }}:${{ secrets.BITBUCKET_TOKEN }}@${{ env.BITBUCKET_BASE_URL.Replace("https://","") }}/scm/gwcpdev/${{ env.REPO_SLUG }}.git

      # -------------------------------
      # (Place Your Build / Scan Steps Here)
      # -------------------------------

      - name: Simulate Build
        shell: pwsh
        run: |
          Write-Host "Running Quality Gates..."
          Start-Sleep -Seconds 10
          Write-Host "Validation Completed"

      # -------------------------------
      # Get Okta Access Token
      # -------------------------------
      - name: Get Okta Access Token
        shell: pwsh
        run: |
          $body = @{
              grant_type = "client_credentials"
              scope = "cicd.qualitygates.read cicd.qualitygates.write tenant.$env:CICD_TENANT project.$env:CICD_STAR_SYSTEM"
              client_id = "${{ secrets.OKTA_CLIENT_ID }}"
              client_secret = "${{ secrets.OKTA_CLIENT_SECRET }}"
          }

          $response = Invoke-RestMethod `
            -Method Post `
            -Uri $env:OKTA_TOKEN_URL `
            -ContentType "application/x-www-form-urlencoded" `
            -Body $body

          $token = $response.access_token

          if (-not $token) {
              Write-Error "Failed to retrieve Okta token"
              exit 1
          }

          "CICD_TOKEN=$token" | Out-File -FilePath $env:GITHUB_ENV -Append

      # -------------------------------
      # Close Guidewire Quality Gate
      # -------------------------------
      - name: Close Guidewire Quality Gate
        shell: pwsh
        run: |
          $url = "$env:CICD_BASE_URL/api/v3/tenants/$env:CICD_TENANT/starsystems/$env:CICD_STAR_SYSTEM/applications/$env:CICD_APP/quality-gates/$env:CICD_QUALITY_GATE/verifications"

          $headers = @{
              Authorization = "Bearer $env:CICD_TOKEN"
              "Content-Type" = "application/json"
          }

          $body = @{
              artifact = @{
                  type = "COMMIT"
                  id   = "${{ inputs.PR_COMMIT }}"
              }
              status  = "SUCCESSFUL"
              url     = "${{ inputs.PR_URL }}"
              comment = "Security scans completed – findings accepted as per CM policy"
          } | ConvertTo-Json -Depth 5

          Invoke-RestMethod `
            -Method Post `
            -Uri $url `
            -Headers $headers `
            -Body $body

          Write-Host "Quality Gate closed successfully."
