name: Downstream Job - BillingCenter PR Quality Gate

on:
  workflow_dispatch:
    inputs:
      PR_REPOSITORY:
        description: "Bitbucket Repository Slug"
        required: true
        type: string

      PR_BRANCH:
        description: "Pull Request Branch"
        required: true
        type: string

      PR_COMMIT:
        description: "Pull Request Commit SHA"
        required: true
        type: string

      PR_URL:
        description: "Pull Request URL"
        required: true
        type: string

jobs:

  downstream:

    runs-on: self-hosted
    timeout-minutes: 120

    outputs:
      total: ${{ steps.aggregate.outputs.total }}

    env:
      APP_NAME: BillingCenter
      CICD_APP: BC

      BITBUCKET_PROJECT: GWCPDEV

      CICD_BASE_URL: https://cicd-manager-service.api.omega2-andromeda.guidewire.net
      CICD_TENANT: valuemom
      CICD_STAR_SYSTEM: gwcp
      CICD_QUALITY_GATE: prqualitygatedemo

      OKTA_TOKEN_URL: https://guidewire-hub.okta.com/oauth2/aus11vix3uKEpIfSI357/v1/token

    steps:

      # -------------------------------------------------
      # Checkout Workflow Repo
      # -------------------------------------------------
      - name: Checkout Workflow Repo
        uses: actions/checkout@v4

      # -------------------------------------------------
      # Prepare Context
      # -------------------------------------------------
      - name: Prepare Context
        shell: powershell
        run: |

          $cleanBranch = "${{ inputs.PR_BRANCH }}" -replace "^refs/heads/", ""

          Write-Host ""
          Write-Host "================================="
          Write-Host "Application Context"
          Write-Host "================================="
          Write-Host "Application : $env:APP_NAME"
          Write-Host "Repository  : ${{ inputs.PR_REPOSITORY }}"
          Write-Host "Branch      : $cleanBranch"
          Write-Host "Commit      : ${{ inputs.PR_COMMIT }}"
          Write-Host "PR URL      : ${{ inputs.PR_URL }}"
          Write-Host "================================="
          Write-Host ""

          "CLEAN_BRANCH=$cleanBranch" >> $env:GITHUB_ENV

      # -------------------------------------------------
      # Validate Repository Access
      # -------------------------------------------------
      - name: Validate Repository Access
        shell: powershell
        env:
          HOST: ${{ secrets.GW_BITBUCKET_BASE }}
          TOKEN: ${{ secrets.GW_BITBUCKET_TOKEN }}
        run: |

          $repo = "${{ inputs.PR_REPOSITORY }}"
          $project = "$env:BITBUCKET_PROJECT"

          $headers = @{
            Authorization = "Bearer $env:TOKEN"
          }

          $repoUrl = "https://$env:HOST/rest/api/latest/projects/$project/repos/$repo"

          Write-Host ""
          Write-Host "Validating Bitbucket repository..."
          Write-Host $repoUrl
          Write-Host ""

          $repoResp = Invoke-RestMethod `
            -Uri $repoUrl `
            -Headers $headers `
            -Method Get `
            -ErrorAction Stop

          Write-Host ""
          Write-Host "Repository validation successful"
          Write-Host "Repository Name : $($repoResp.name)"
          Write-Host "Repository Slug : $($repoResp.slug)"
          Write-Host ""

          "REPO_SLUG=$($repoResp.slug)" >> $env:GITHUB_ENV

      # -------------------------------------------------
      # Get Changed Files
      # -------------------------------------------------
      - name: Get changed files
        shell: powershell
        env:
          HOST: ${{ secrets.GW_BITBUCKET_BASE }}
          TOKEN: ${{ secrets.GW_BITBUCKET_TOKEN }}
        run: |

          $repo = "$env:REPO_SLUG"
          $commit = "${{ inputs.PR_COMMIT }}"
          $project = "$env:BITBUCKET_PROJECT"

          $headers = @{
            Authorization = "Bearer $env:TOKEN"
          }

          $url = "https://$env:HOST/rest/api/latest/projects/$project/repos/$repo/commits/$commit/changes?limit=5000"

          Write-Host ""
          Write-Host "Calling Bitbucket API"
          Write-Host $url
          Write-Host ""

          $resp = Invoke-RestMethod `
            -Uri $url `
            -Headers $headers `
            -Method Get `
            -ErrorAction Stop

          New-Item `
            -ItemType Directory `
            -Path scanfiles `
            -Force | Out-Null

          $files = @()

          foreach ($v in $resp.values) {

              if ($v.path.toString) {

                  $files += $v.path.toString
              }
          }

          $files | Out-File changed_files.txt -Encoding utf8

          Write-Host ""
          Write-Host "Changed Files"
          Write-Host "===================="

          $files

      # -------------------------------------------------
      # Download Changed Files
      # -------------------------------------------------
      - name: Download changed files
        shell: powershell
        env:
          HOST: ${{ secrets.GW_BITBUCKET_BASE }}
          TOKEN: ${{ secrets.GW_BITBUCKET_TOKEN }}
        run: |

          $repo = "$env:REPO_SLUG"
          $commit = "${{ inputs.PR_COMMIT }}"
          $project = "$env:BITBUCKET_PROJECT"

          $headers = @{
            Authorization = "Bearer $env:TOKEN"
          }

          $files = Get-Content changed_files.txt

          foreach ($f in $files) {

              if ([string]::IsNullOrWhiteSpace($f)) {
                  continue
              }

              # IMPORTANT FIX
              # Use ${f} so PowerShell does not break variable parsing

              $fileUrl = "https://$env:HOST/rest/api/latest/projects/$project/repos/$repo/raw/${f}?at=$commit"

              Write-Host ""
              Write-Host "Downloading:"
              Write-Host $fileUrl
              Write-Host ""

              $dest = "scanfiles\$f"

              $dir = Split-Path $dest

              New-Item `
                -ItemType Directory `
                -Path $dir `
                -Force `
                -ErrorAction SilentlyContinue | Out-Null

              try {

                  Invoke-WebRequest `
                    -Uri $fileUrl `
                    -Headers $headers `
                    -OutFile $dest `
                    -ErrorAction Stop

                  Write-Host "Downloaded: $f"

                  $size = (Get-Item $dest).Length

                  Write-Host "Downloaded Size: $size bytes"
              }
              catch {

                  Write-Host ""
                  Write-Host "FAILED DOWNLOAD: $f"

                  if ($_.Exception.Response -ne $null) {

                      $reader = New-Object System.IO.StreamReader(
                        $_.Exception.Response.GetResponseStream()
                      )

                      $reader.BaseStream.Position = 0
                      $reader.DiscardBufferedData()

                      Write-Host ($reader.ReadToEnd())
                  }

                  Write-Host $_.Exception.Message
                  Write-Host ""
              }
          }

          Write-Host ""
          Write-Host "Downloaded Files"
          Write-Host "===================="

          Get-ChildItem scanfiles -Recurse

      # -------------------------------------------------
      # Install Gitleaks
      # -------------------------------------------------
      - name: Install Gitleaks
        shell: powershell
        run: |

          $version = "8.24.2"

          Invoke-WebRequest `
            -Uri "https://github.com/gitleaks/gitleaks/releases/download/v$version/gitleaks_${version}_windows_x64.zip" `
            -OutFile "gitleaks.zip"

          Expand-Archive `
            gitleaks.zip `
            -DestinationPath "$env:RUNNER_TEMP\gitleaks" `
            -Force

          $gitleaksExe = "$env:RUNNER_TEMP\gitleaks\gitleaks.exe"

          & $gitleaksExe version

      # -------------------------------------------------
      # Run Gitleaks
      # -------------------------------------------------
      - name: Run Gitleaks
        shell: powershell
        run: |

          $gitleaksExe = "$env:RUNNER_TEMP\gitleaks\gitleaks.exe"

          if (Test-Path scanfiles) {

              Write-Host ""
              Write-Host "Running Gitleaks Scan..."
              Write-Host ""

              & $gitleaksExe detect `
                --no-git `
                --source scanfiles `
                --report-format json `
                --report-path gitleaks-report.json `
                --exit-code 0 `
                --verbose
          }
          else {

              "[]" | Out-File gitleaks-report.json -Encoding utf8
          }

          Write-Host ""
          Write-Host "Gitleaks scan completed"
          Write-Host ""

      # -------------------------------------------------
      # Aggregate Findings
      # -------------------------------------------------
      - name: Aggregate findings
        id: aggregate
        shell: powershell
        run: |

          $gitleaks = 0

          if (Test-Path gitleaks-report.json) {

              $content = Get-Content gitleaks-report.json -Raw

              if ($content.Trim() -ne "") {

                  $parsed = $content | ConvertFrom-Json

                  if ($parsed) {

                      $gitleaks = $parsed.Count
                  }
              }
          }

          Write-Host ""
          Write-Host "================================="
          Write-Host "Security Scan Summary"
          Write-Host "================================="
          Write-Host "Gitleaks Findings : $gitleaks"
          Write-Host "================================="
          Write-Host ""

          "total=$gitleaks" >> $env:GITHUB_OUTPUT

      # -------------------------------------------------
      # Upload Reports
      # -------------------------------------------------
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: billingcenter-security-reports
          path: |
            gitleaks-report.json
            changed_files.txt
            scanfiles

      # -------------------------------------------------
      # Get Okta Token
      # -------------------------------------------------
      - name: Get Okta token
        id: okta
        shell: powershell
        env:
          OKTA_URL: ${{ secrets.OKTA_TOKEN_URL }}
          CLIENT_ID: ${{ secrets.OKTA_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.OKTA_CLIENT_SECRET }}
        run: |

          Write-Host "Requesting Okta token..."

          $pair = "$env:CLIENT_ID`:$env:CLIENT_SECRET"

          $bytes = [System.Text.Encoding]::ASCII.GetBytes($pair)

          $base64 = [Convert]::ToBase64String($bytes)

          $headers = @{
              Authorization = "Basic $base64"
              Accept = "application/json"
              "Content-Type" = "application/x-www-form-urlencoded"
          }

          $body = "grant_type=client_credentials&scope=cicd.qualitygates.read cicd.qualitygates.write tenant.valuemom project.gwcp planet_class.lower"

          $resp = Invoke-RestMethod `
            -Method Post `
            -Uri $env:OKTA_URL `
            -Headers $headers `
            -Body $body

          Write-Host "Okta token acquired"

          "token=$($resp.access_token)" >> $env:GITHUB_OUTPUT

      # -------------------------------------------------
      # Update Guidewire Quality Gate
      # -------------------------------------------------
      - name: Update Guidewire Quality Gate
        shell: powershell
        env:
          GW_URL: https://cicd-manager-service.api.omega2-andromeda.guidewire.net
          TENANT: valuemom
          STAR: gwcp
          APP: bc
          TOKEN: ${{ steps.okta.outputs.token }}
          COMMIT: ${{ inputs.PR_COMMIT }}
          PR_URL: ${{ inputs.PR_URL }}
          QUALITY_GATE: prqualitygatedemo
        run: |

          $total = "${{ steps.aggregate.outputs.total }}"

          if ([int]$total -gt 0) {

              $status = "FAILED"
              $comment = "Secrets detected by Gitleaks"

              Write-Host ""
              Write-Host "================================="
              Write-Host "SECRETS DETECTED"
              Write-Host "QUALITY GATE FAILED"
              Write-Host "================================="
              Write-Host ""
          }
          else {

              $status = "SUCCESSFUL"
              $comment = "No secrets detected"

              Write-Host ""
              Write-Host "================================="
              Write-Host "NO SECRETS DETECTED"
              Write-Host "QUALITY GATE SUCCESSFUL"
              Write-Host "================================="
              Write-Host ""
          }

          $body = @{
            artifact = @{
              type = "COMMIT"
              id   = $env:COMMIT
            }
            status = $status
            url = $env:PR_URL
            comment = $comment
          } | ConvertTo-Json -Depth 5

          $uri = "$env:GW_URL/api/v3/tenants/$env:TENANT/starsystems/$env:STAR/applications/$env:APP/quality-gates/$env:QUALITY_GATE/verifications"

          Write-Host ""
          Write-Host "Posting verification to:"
          Write-Host $uri
          Write-Host ""

          Invoke-RestMethod `
            -Method Post `
            -Uri $uri `
            -Headers @{
              Authorization = "Bearer $env:TOKEN"
            } `
            -Body $body `
            -ContentType "application/json"

          Write-Host ""
          Write-Host "Guidewire quality gate updated successfully"
          Write-Host ""

  # -------------------------------------------------
  # Final Security Gate
  # -------------------------------------------------
  final-gate:

    needs: downstream

    runs-on: self-hosted

    steps:

      - name: Enforce Security Gate
        shell: powershell
        run: |

          $total = "${{ needs.downstream.outputs.total }}"

          if ([int]$total -gt 0) {

              Write-Host ""
              Write-Host "================================="
              Write-Host "Security findings detected"
              Write-Host "Failing pipeline"
              Write-Host "================================="
              Write-Host ""

              exit 1
          }
          else {

              Write-Host ""
              Write-Host "Security gate passed"
              Write-Host ""
          }
