name: Downstream Job - BillingCenter PR Quality Gate

on:
  workflow_dispatch:
    inputs:
      PR_REPOSITORY:
        description: "Bitbucket Repository Slug"
        required: true
        type: string

      PR_BRANCH:
        description: "Pull Request Branch"
        required: true
        type: string

      PR_COMMIT:
        description: "Pull Request Commit SHA"
        required: true
        type: string

      PR_URL:
        description: "Pull Request URL"
        required: true
        type: string

jobs:

  downstream:

    runs-on: self-hosted
    timeout-minutes: 120

    outputs:
      total: ${{ steps.aggregate.outputs.total }}

    env:
      APP_NAME: BillingCenter
      CICD_APP: BC

      # IMPORTANT
      # Actual Bitbucket host from your PR URL
      BITBUCKET_PROJECT: GWCPDEV

      CICD_BASE_URL: https://cicd-manager-service.api.omega2-andromeda.guidewire.net
      CICD_TENANT: valuemomentum
      CICD_STAR_SYSTEM: gwcp
      CICD_QUALITY_GATE: prqualitygatedemo

      OKTA_TOKEN_URL: https://guidewire-hub.okta.com/oauth2/aus11vix3uKEpIfSI357/v1/token

    steps:

      # -------------------------------------------------
      # Checkout Workflow Repo
      # -------------------------------------------------
      - name: Checkout Workflow Repo
        uses: actions/checkout@v4

      # -------------------------------------------------
      # Prepare Context
      # -------------------------------------------------
      - name: Prepare Context
        shell: powershell
        run: |

          $cleanBranch = "${{ inputs.PR_BRANCH }}" -replace "^refs/heads/", ""

          Write-Host ""
          Write-Host "================================="
          Write-Host "Application Context"
          Write-Host "================================="
          Write-Host "Application : $env:APP_NAME"
          Write-Host "Repository  : ${{ inputs.PR_REPOSITORY }}"
          Write-Host "Branch      : $cleanBranch"
          Write-Host "Commit      : ${{ inputs.PR_COMMIT }}"
          Write-Host "================================="
          Write-Host ""

          "CLEAN_BRANCH=$cleanBranch" >> $env:GITHUB_ENV

      # -------------------------------------------------
      # Validate Repository Access
      # -------------------------------------------------
      - name: Validate Repository Access
        shell: powershell
        env:
          HOST: ${{ secrets.GW_BITBUCKET_BASE }}
          TOKEN: ${{ secrets.GW_BITBUCKET_TOKEN }}
        run: |

          $repo = "${{ inputs.PR_REPOSITORY }}"
          $project = "$env:BITBUCKET_PROJECT"

          $headers = @{
            Authorization = "Bearer $env:TOKEN"
          }

          $repoUrl = "https://$env:HOST/rest/api/latest/projects/$project/repos/$repo"

          Write-Host ""
          Write-Host "Validating Bitbucket repository..."
          Write-Host $repoUrl
          Write-Host ""

          try {

              $repoResp = Invoke-RestMethod `
                -Uri $repoUrl `
                -Headers $headers `
                -Method Get `
                -ErrorAction Stop

              Write-Host "Repository Found"
              Write-Host "Name : $($repoResp.name)"
              Write-Host "Slug : $($repoResp.slug)"
          }
          catch {

              Write-Host ""
              Write-Host "Repository validation failed"
              Write-Host $_.Exception.Message
              Write-Host ""

              throw
          }

      # -------------------------------------------------
      # Get Changed Files
      # -------------------------------------------------
      - name: Get changed files
        shell: powershell
        env:
          HOST: ${{ secrets.GW_BITBUCKET_BASE }}
          TOKEN: ${{ secrets.GW_BITBUCKET_TOKEN }}
        run: |

          $repo   = "${{ inputs.PR_REPOSITORY }}"
          $commit = "${{ inputs.PR_COMMIT }}"
          $project = "$env:BITBUCKET_PROJECT"

          $headers = @{
            Authorization = "Bearer $env:TOKEN"
          }

          $url = "https://$env:HOST/rest/api/latest/projects/$project/repos/$repo/commits/$commit/changes?limit=5000"

          Write-Host ""
          Write-Host "Calling Bitbucket API"
          Write-Host $url
          Write-Host ""

          try {

              $resp = Invoke-RestMethod `
                -Uri $url `
                -Headers $headers `
                -Method Get `
                -ErrorAction Stop
          }
          catch {

              Write-Host ""
              Write-Host "Bitbucket API failed"
              Write-Host $_.Exception.Message
              Write-Host ""

              throw
          }

          New-Item `
            -ItemType Directory `
            -Path scanfiles `
            -Force | Out-Null

          $files = @()

          foreach ($v in $resp.values) {

              if ($v.path.toString) {

                  $files += $v.path.toString
              }
          }

          $files | Out-File changed_files.txt -Encoding utf8

          Write-Host ""
          Write-Host "Changed files:"
          Write-Host "===================="

          $files

      # -------------------------------------------------
      # Download Changed Files
      # -------------------------------------------------
      - name: Download changed files
        shell: powershell
        env:
          HOST: ${{ secrets.GW_BITBUCKET_BASE }}
          TOKEN: ${{ secrets.GW_BITBUCKET_TOKEN }}
        run: |

          $repo   = "${{ inputs.PR_REPOSITORY }}"
          $commit = "${{ inputs.PR_COMMIT }}"
          $project = "$env:BITBUCKET_PROJECT"

          $headers = @{
            Authorization = "Bearer $env:TOKEN"
          }

          if (-not (Test-Path changed_files.txt)) {

              Write-Host "No changed_files.txt found"
              exit 0
          }

          $files = Get-Content changed_files.txt

          foreach ($f in $files) {

              if ([string]::IsNullOrWhiteSpace($f)) {
                  continue
              }

              $fileUrl = "https://$env:HOST/rest/api/latest/projects/$project/repos/$repo/raw/$f?at=$commit"

              $dest = "scanfiles\$f"

              $dir = Split-Path $dest

              New-Item `
                -ItemType Directory `
                -Path $dir `
                -Force `
                -ErrorAction SilentlyContinue | Out-Null

              try {

                  Invoke-WebRequest `
                    -Uri $fileUrl `
                    -Headers $headers `
                    -OutFile $dest `
                    -ErrorAction Stop

                  Write-Host "Downloaded $f"
              }
              catch {

                  Write-Host "Skipping file: $f"
              }
          }

      # -------------------------------------------------
      # Install Semgrep
      # -------------------------------------------------
      - name: Install Semgrep
        shell: powershell
        run: |

          python -m pip install --upgrade pip

          pip install semgrep

          semgrep --version

      # -------------------------------------------------
      # Run Semgrep
      # -------------------------------------------------
      - name: Run Semgrep
        shell: powershell
        run: |

          chcp 65001 > $null

          $env:PYTHONUTF8 = "1"
          $env:PYTHONIOENCODING = "utf-8"

          if (Test-Path scanfiles) {

              semgrep scan scanfiles `
                --config=auto `
                --json `
                -o semgrep-report.json
          }
          else {

              '{"results":[]}' | Out-File semgrep-report.json -Encoding utf8
          }

      # -------------------------------------------------
      # Install Gitleaks
      # -------------------------------------------------
      - name: Install Gitleaks
        shell: powershell
        run: |

          $version = "8.24.2"

          Invoke-WebRequest `
            -Uri "https://github.com/gitleaks/gitleaks/releases/download/v$version/gitleaks_${version}_windows_x64.zip" `
            -OutFile "gitleaks.zip"

          Expand-Archive `
            gitleaks.zip `
            -DestinationPath "$env:RUNNER_TEMP\gitleaks" `
            -Force

          $gitleaksExe = "$env:RUNNER_TEMP\gitleaks\gitleaks.exe"

          & $gitleaksExe version

      # -------------------------------------------------
      # Run Gitleaks
      # -------------------------------------------------
      - name: Run Gitleaks
        shell: powershell
        run: |

          $gitleaksExe = "$env:RUNNER_TEMP\gitleaks\gitleaks.exe"

          if (Test-Path scanfiles) {

              & $gitleaksExe detect `
                --no-git `
                --source scanfiles `
                --report-format json `
                --report-path gitleaks-report.json `
                --exit-code 0
          }
          else {

              "[]" | Out-File gitleaks-report.json -Encoding utf8
          }

      # -------------------------------------------------
      # Aggregate Findings
      # -------------------------------------------------
      - name: Aggregate findings
        id: aggregate
        shell: powershell
        run: |

          $semgrep = 0
          $gitleaks = 0

          if (Test-Path semgrep-report.json) {

              $semgrep = (
                Get-Content semgrep-report.json | ConvertFrom-Json
              ).results.Count
          }

          if (Test-Path gitleaks-report.json) {

              $gitleaks = (
                Get-Content gitleaks-report.json | ConvertFrom-Json
              ).Count
          }

          $total = $semgrep + $gitleaks

          Write-Host ""
          Write-Host "================================="
          Write-Host "Security Scan Summary"
          Write-Host "================================="
          Write-Host "Semgrep Findings : $semgrep"
          Write-Host "Gitleaks Findings: $gitleaks"
          Write-Host "Total Findings   : $total"
          Write-Host "================================="
          Write-Host ""

          "total=$total" >> $env:GITHUB_OUTPUT

      # -------------------------------------------------
      # Upload Reports
      # -------------------------------------------------
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: billingcenter-security-reports
          path: |
            semgrep-report.json
            gitleaks-report.json
            changed_files.txt

      # -------------------------------------------------
      # Get Okta Token
      # -------------------------------------------------
      - name: Get Okta token
        id: okta
        shell: powershell
        env:
          OKTA_URL: ${{ secrets.OKTA_TOKEN_URL }}
          CLIENT_ID: ${{ secrets.OKTA_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.OKTA_CLIENT_SECRET }}
        run: |
      
          Write-Host "Requesting Okta token..."
      
          $pair = "$env:CLIENT_ID`:$env:CLIENT_SECRET"
      
          $bytes = [System.Text.Encoding]::ASCII.GetBytes($pair)
      
          $base64 = [Convert]::ToBase64String($bytes)
      
          $headers = @{
              Authorization = "Basic $base64"
              Accept        = "application/json"
              "Content-Type"= "application/x-www-form-urlencoded"
          }
      
          # IMPORTANT
          # Use EXACT SAME scope as working pipeline
          $body = "grant_type=client_credentials&scope=cicd.qualitygates.read cicd.qualitygates.write tenant.valuemom project.gwcp planet_class.lower"
      
          try {
      
              $resp = Invoke-RestMethod `
                -Method Post `
                -Uri $env:OKTA_URL `
                -Headers $headers `
                -Body $body `
                -ErrorAction Stop
          }
          catch {
      
              Write-Host "Okta request failed"
      
              if ($_.Exception.Response -ne $null) {
      
                  $reader = New-Object System.IO.StreamReader(
                    $_.Exception.Response.GetResponseStream()
                  )
      
                  $reader.BaseStream.Position = 0
                  $reader.DiscardBufferedData()
      
                  Write-Host ($reader.ReadToEnd())
              }
      
              throw "Okta authentication failed"
          }
      
          if (-not $resp.access_token) {
      
              $resp | ConvertTo-Json -Depth 5
      
              throw "Okta returned no access_token"
          }
      
          Write-Host "Okta token acquired"
      
          "token=$($resp.access_token)" >> $env:GITHUB_OUTPUT

      # -------------------------------------------------
      # Update Guidewire Quality Gate
      # -------------------------------------------------
      - name: Update Guidewire Quality Gate
        shell: powershell
        env:
          GW_URL: https://cicd-manager-service.api.omega2-andromeda.guidewire.net
          TENANT: valuemom
          STAR: gwcp
          APP: bc
          TOKEN: ${{ steps.okta.outputs.token }}
          COMMIT: ${{ inputs.PR_COMMIT }}
          PR_URL: ${{ inputs.PR_URL }}
        run: |

          $total = "${{ steps.aggregate.outputs.total }}"

          if ($total -gt 0) {

              $status = "FAILED"
              $comment = "Security findings detected"
          }
          else {

              $status = "SUCCESSFUL"
              $comment = "Security scans passed"
          }

          $body = @{
            artifact = @{
              type = "COMMIT"
              id   = $env:COMMIT
            }
            status = $status
            url = $env:PR_URL
            comment = $comment
          } | ConvertTo-Json -Depth 5

          $uri = "$env:GW_URL/api/v3/tenants/$env:TENANT/starsystems/$env:STAR/applications/$env:APP/quality-gates/prqualitygatedemo/verifications"

          Invoke-RestMethod `
            -Method Post `
            -Uri $uri `
            -Headers @{
              Authorization = "Bearer $env:TOKEN"
            } `
            -Body $body `
            -ContentType "application/json"

          Write-Host "Guidewire quality gate updated"

  # -------------------------------------------------
  # Final Security Gate
  # -------------------------------------------------
  final-gate:

    needs: downstream

    runs-on: self-hosted

    steps:

      - name: Enforce Security Gate
        shell: powershell
        run: |

          $total = "${{ needs.downstream.outputs.total }}"

          if ($total -gt 0) {

              Write-Host "Security findings detected"

              exit 1
          }
          else {

              Write-Host "Security gate passed"
          }
